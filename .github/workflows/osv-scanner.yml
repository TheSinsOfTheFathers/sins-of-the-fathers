name: OSV-Scanner (Güvenlik Taraması)

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  schedule:
    - cron: "30 12 * * 1"

jobs:
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        --ignore-dev
        --min-severity=7.0
        ./
    permissions:
      security-events: write
      contents: read
      actions: read
