<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="The Bloodline Case File: An intelligence web of all major operatives, architects, and associates in the Ravenwood & Havi saga.">
    <title>Bloodline Case File | TSOF Archives</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&family=Courier+Prime&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="../src/style.css">

    <script type="module" src="../src/main.js"></script>

    <style>
        body, html {
            overflow: hidden; /* Prevent native scroll, use pan/zoom */
            touch-action: none;
        }
        #bloodline-container {
            width: 100vw;
            height: calc(100vh - 80px); /* Fill screen minus header */
            cursor: grab;
        }
        #bloodline-container:active {
            cursor: grabbing;
        }
        .faction-filters button.active {
            border-color: #c5a059;
            color: #c5a059;
            background: rgba(197, 160, 89, 0.1);
        }
    </style>
</head>
<body class="flex flex-col h-screen bg-obsidian selection:bg-gold selection:text-black relative overflow-hidden">

    <!-- Visual Effects -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-1/4 left-1/4 w-[800px] h-[800px] bg-gold/5 rounded-full blur-[120px] mix-blend-screen opacity-50"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-red-900/5 rounded-full blur-[150px] mix-blend-screen opacity-30"></div>
        <div class="noise-overlay absolute inset-0 opacity-40"></div>
    </div>

    <!-- Header Navigation (Slimmed height assumed ~80px) -->
    <header class="fixed top-0 w-full z-50 bg-obsidian/90 backdrop-blur-md border-b border-white/5 h-[80px] flex items-center">
        <nav class="container mx-auto px-6 flex justify-between items-center relative w-full">
            <a href="/" class="text-xl md:text-3xl font-serif text-gold tracking-widest uppercase hover:text-white transition-colors z-20 relative">TSOF</a>
            
            <!-- Filters -->
            <div class="faction-filters hidden md:flex items-center space-x-2 xl:space-x-4 text-[10px] xl:text-xs uppercase tracking-widest font-mono z-20">
                <button data-faction="ALL" class="active px-3 py-1 border border-white/10 hover:border-gold/50 text-white/70 transition-all rounded">ALL</button>
                <button data-faction="RAVENWOOD" class="px-3 py-1 border border-white/10 hover:border-gold/50 text-white/70 transition-all rounded">RAVENWOOD</button>
                <button data-faction="OLD_WORLD" class="px-3 py-1 border border-white/10 hover:border-gold/50 text-white/70 transition-all rounded">OLD WORLD</button>
            </div>

            <!-- Language Switcher & Back -->
            <div class="flex gap-4 items-center font-mono text-[10px] z-20">
                <a href="/" class="hover:text-gold text-gray-400 border-b border-white/10 pb-1">GO BACK</a>
            </div>
        </nav>
    </header>

    <!-- Main Content Area strictly fitted -->
    <main class="pt-[80px] h-screen relative z-10 w-full">
        <section class="w-full h-full relative" aria-label="Intelligence web visualization">
            <!-- Mobile Filters (if screen is small) -->
            <div class="faction-filters md:hidden absolute top-4 left-1/2 transform -translate-x-1/2 z-30 flex space-x-2 text-[10px] uppercase font-mono bg-black/80 backdrop-blur p-2 rounded border border-white/10">
                <button data-faction="ALL" class="active px-2 py-1 border border-transparent text-white/70">ALL</button>
                <button data-faction="RAVENWOOD" class="px-2 py-1 border border-transparent text-white/70">RAVEN</button>
                <button data-faction="OLD_WORLD" class="px-2 py-1 border border-transparent text-white/70">OLD</button>
            </div>

            <!-- Map Controls -->
            <div class="absolute bottom-6 right-6 z-30 flex flex-col gap-2 font-mono text-xs">
                <button id="zoom-in" class="w-8 h-8 bg-black/80 border border-white/10 text-white/70 hover:text-gold hover:border-gold transition-colors rounded flex items-center justify-center"><i class="fas fa-plus"></i></button>
                <button id="zoom-out" class="w-8 h-8 bg-black/80 border border-white/10 text-white/70 hover:text-gold hover:border-gold transition-colors rounded flex items-center justify-center"><i class="fas fa-minus"></i></button>
                <button id="zoom-reset" class="w-8 h-8 bg-black/80 border border-white/10 text-white/70 hover:text-gold hover:border-gold transition-colors rounded flex items-center justify-center mt-2" title="Reset"><i class="fas fa-compress"></i></button>
            </div>

            <!-- Legend -->
            <div class="absolute bottom-6 left-6 z-20 flex flex-col gap-2 font-mono text-[10px] text-gray-400 uppercase tracking-widest bg-black/80 backdrop-blur p-4 border border-white/10 rounded pointer-events-none">
                <span class="flex items-center gap-2"><div class="w-4 h-[1px] bg-red-900 border-b border-dashed border-red-900"></div> RIVALRY / BLOOD OATH</span>
                <span class="flex items-center gap-2"><div class="w-4 h-[1px] bg-gray-600"></div> HIERARCHY / ALLIANCE</span>
            </div>

            <!-- The canvas -->
            <div id="bloodline-container" class="bg-black/20"></div>
        </section>
    </main>

    <!-- Init -->
    <script type="module">
        import { renderBloodline } from '../src/modules/loaders/bloodline-loader.js';
        document.addEventListener('DOMContentLoaded', () => {
            renderBloodline('#bloodline-container');
        });
    </script>
</body>
</html>
